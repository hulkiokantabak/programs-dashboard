<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hulki's Programs Dashboard</title>
  <style>
    /* ── THEME ── */
    :root {
      --bg:       #0d1117;
      --surf:     #161b22;
      --surf2:    #1c2128;
      --border:   #30363d;
      --border2:  #21262d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --dim:      #484f58;
      --blue:     #58a6ff;
      --blue-btn: #1f6feb;
      --green:    #3fb950;
      --green-btn:#238636;
      --purple:   #bc8cff;
      --orange:   #d29922;
      --red:      #f85149;
      --shadow:   rgba(0,0,0,.42);
    }
    html.light {
      --bg:       #ffffff;
      --surf:     #f6f8fa;
      --surf2:    #eaeef2;
      --border:   #d0d7de;
      --border2:  #d8dee4;
      --text:     #1f2328;
      --muted:    #57606a;
      --dim:      #8c959f;
      --blue:     #0969da;
      --blue-btn: #0969da;
      --green:    #1a7f37;
      --green-btn:#1a7f37;
      --purple:   #8250df;
      --orange:   #9a6700;
      --red:      #cf222e;
      --shadow:   rgba(0,0,0,.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── SHELL ── */
    .shell { display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar { width: 252px; min-width: 252px; background: var(--surf);
               border-right: 1px solid var(--border); display: flex;
               flex-direction: column; overflow: hidden; }
    .sidebar-top { padding: 15px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .brand     { font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: 7px; }
    .brand-sub { font-size: .68rem; color: var(--muted); margin-top: 3px; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 7px 0 4px; }
    .nav-section { font-size: .6rem; font-weight: 700; text-transform: uppercase;
                   letter-spacing: .09em; color: var(--dim); padding: 10px 16px 4px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px 7px 14px;
                margin: 1px 5px; border-radius: 7px; cursor: pointer;
                transition: background .11s; user-select: none; }
    .nav-item:hover  { background: var(--surf2); }
    .nav-item.active { background: color-mix(in srgb, var(--blue-btn) 12%, transparent); }
    .nav-item.active .nav-name  { color: var(--blue); }
    .nav-item.active .nav-badge { color: var(--blue);
      border-color: color-mix(in srgb, var(--blue) 40%, transparent); }
    .nav-icon  { font-size: .95rem; flex-shrink: 0; width: 18px; text-align: center; }
    .nav-text  { flex: 1; min-width: 0; }
    .nav-name  { font-size: .8rem; font-weight: 600; white-space: nowrap;
                 overflow: hidden; text-overflow: ellipsis; }
    .nav-cat   { font-size: .61rem; color: var(--muted); margin-top: 1px; }
    .nav-item.active .nav-cat { color: color-mix(in srgb, var(--blue) 65%, var(--muted)); }
    .nav-badge { font-size: .62rem; font-weight: 700; color: var(--dim);
                 background: var(--surf2); border: 1px solid var(--border2);
                 border-radius: 20px; padding: 1px 7px; flex-shrink: 0; }
    .nav-launch { text-decoration: none; color: var(--muted); font-size: .72rem;
                  padding: 3px 6px; border-radius: 5px; border: 1px solid var(--border);
                  flex-shrink: 0; opacity: 0; transition: opacity .12s, color .12s;
                  background: var(--surf2); }
    .nav-item:hover .nav-launch { opacity: 1; }
    .nav-launch:hover { color: var(--green); border-color: var(--green); }
    .nav-hint { font-size: .63rem; color: var(--dim); padding: 10px 16px 4px; font-style: italic; }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 11px 12px 13px;
                      flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
    .token-row { display: flex; align-items: center; gap: 6px; }
    .token-row input { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border);
                       border-radius: 5px; color: var(--text); font-size: .71rem;
                       padding: 4px 8px; outline: none; }
    .token-row input:focus { border-color: var(--blue); }
    .tok-status { font-size: .66rem; }
    .tok-ok   { color: var(--green); }
    .tok-warn { color: var(--orange); }
    .footer-row { display: flex; align-items: center; gap: 7px; }
    .btn { cursor: pointer; border: none; border-radius: 6px; font-size: .75rem;
           font-weight: 600; padding: 5px 11px; transition: opacity .15s; white-space: nowrap; }
    .btn:hover { opacity: .82; }
    .btn-ghost { background: var(--surf2); color: var(--muted); border: 1px solid var(--border); }
    .btn-green { background: var(--green-btn); color: #fff; }
    .btn-icon  { padding: 5px 7px; font-size: .9rem; background: none;
                 border: 1px solid var(--border); border-radius: 6px; color: var(--muted); }
    .last-upd  { font-size: .62rem; color: var(--dim); margin-left: auto; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; background: var(--bg); }
    .main-inner { padding: 28px 34px 52px; max-width: 1020px; }

    /* ── PROGRAM HEADER ── */
    .prog-header { display: flex; align-items: flex-start; justify-content: space-between;
                   gap: 16px; margin-bottom: 22px; padding-bottom: 18px;
                   border-bottom: 1px solid var(--border); }
    .prog-title { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center;
                  gap: 9px; line-height: 1.1; flex-wrap: wrap; }
    .prog-tag   { font-size: .67rem; font-weight: 600; padding: 3px 9px; border-radius: 20px;
                  background: var(--surf2); color: var(--dim); border: 1px solid var(--border2); }
    .prog-desc  { font-size: .83rem; color: var(--muted); margin-top: 5px; }
    .prog-btns  { display: flex; gap: 7px; flex-shrink: 0; margin-top: 2px; }
    a.pbtn { text-decoration: none; display: flex; align-items: center; gap: 5px;
             padding: 7px 14px; border-radius: 7px; font-size: .79rem; font-weight: 600;
             border: 1px solid var(--border); color: var(--muted); background: var(--surf);
             transition: all .14s; white-space: nowrap; }
    a.pbtn:hover { border-color: var(--blue); color: var(--blue); }
    a.pbtn.play  { background: var(--blue-btn); border-color: var(--blue-btn); color: #fff; }
    a.pbtn.play:hover { opacity: .88; }

    /* ── SUMMARY STAT CARDS ── */
    .sum-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px,1fr));
                gap: 11px; margin-bottom: 24px; }
    .sum-card { background: var(--surf); border: 1px solid var(--border);
                border-radius: 11px; padding: 14px 16px 13px;
                display: flex; flex-direction: column; }
    .card-tgl { display: flex; background: var(--surf2); border: 1px solid var(--border2);
                border-radius: 5px; overflow: hidden; width: fit-content; margin-bottom: 9px; }
    .ctgl { cursor: pointer; background: none; border: none; font-size: .62rem;
            font-weight: 700; padding: 3px 9px; color: var(--dim); transition: all .12s;
            letter-spacing: .02em; }
    .ctgl:hover { color: var(--text); }
    .ctgl.on { background: var(--blue-btn); color: #fff; }
    .sum-val  { font-size: 1.85rem; font-weight: 700; line-height: 1; margin-top: auto; }
    .sum-lbl  { font-size: .68rem; color: var(--muted); margin-top: 5px;
                display: flex; align-items: center; gap: 4px; }
    .sum-sub  { font-size: .62rem; color: var(--dim); margin-top: 2px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* ── SECTIONS ── */
    .section { margin-bottom: 22px; }
    .sec-hdr  { display: flex; align-items: center; gap: 8px; margin-bottom: 13px; }
    .sec-title { font-size: .66rem; font-weight: 700; text-transform: uppercase;
                 letter-spacing: .07em; color: var(--dim); }
    .period { font-weight: 400; text-transform: none; letter-spacing: 0; }

    /* ── CHART LEGEND ── */
    .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 9px; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: .68rem; color: var(--muted); }
    .leg-dot  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .leg-line { display: flex; align-items: center; gap: 5px; font-size: .66rem; color: var(--dim); }
    .leg-swatch { width: 20px; height: 3px; border-radius: 2px; }

    /* ── TRAFFIC ── */
    .traffic-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .chart-wrap { position: relative; }
    canvas { width: 100%; height: 100%; display: block; }

    /* ── SPARKLINE ── */
    .spark-box { background: var(--surf); border: 1px solid var(--border2);
                 border-radius: 10px; padding: 12px 16px; }
    .spark-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .spark-lbl  { font-size: .65rem; color: var(--dim); }
    .spark-stat { font-size: .65rem; color: var(--orange); }
    .spark-wrap { height: 52px; }

    /* ── ALL-PROGRAMS HEADER ── */
    .all-hdr  { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .all-title { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; gap: 9px; }
    .all-sub   { font-size: .83rem; color: var(--muted); margin-top: 5px; }

    /* ── PROGRAMS TABLE ── */
    .prog-table { width: 100%; border-collapse: collapse; font-size: .81rem; }
    .prog-table th { text-align: left; font-size: .61rem; font-weight: 700;
                     text-transform: uppercase; letter-spacing: .06em; color: var(--dim);
                     padding: 5px 10px 8px; border-bottom: 1px solid var(--border); }
    .prog-table th.r { text-align: right; }
    .prog-table td   { padding: 10px 10px; border-bottom: 1px solid var(--border2); vertical-align: middle; }
    .prog-table tbody tr { cursor: pointer; transition: background .09s; }
    .prog-table tbody tr:hover td { background: var(--surf2); }
    .prog-table tbody tr:last-child td { border-bottom: none; }
    .prog-name-cell { display: flex; align-items: center; gap: 7px; font-weight: 600; }
    .tag-sm { font-size: .59rem; color: var(--dim); background: var(--surf2);
              border: 1px solid var(--border2); border-radius: 10px; padding: 1px 6px; flex-shrink: 0; }
    .nc         { font-weight: 700; text-align: right; }
    .nc.blue    { color: var(--blue); }
    .nc.green   { color: var(--green); }
    .nc.orange  { color: var(--orange); }
    .nc.purple  { color: var(--purple); }
    .nc.muted   { color: var(--muted); }
    tfoot tr td { font-weight: 700; font-size: .84rem;
                  background: var(--surf2) !important;
                  border-top: 2px solid var(--border); border-bottom: none !important; }

    /* ── GOATCOUNTER ── */
    .gc-banner { background: var(--surf); border: 1px solid var(--border); border-radius: 12px;
                 padding: 15px 19px; margin-top: 24px;
                 display: flex; align-items: center; justify-content: space-between;
                 gap: 12px; flex-wrap: wrap; }
    .gc-banner h3 { font-size: .87rem; font-weight: 700; margin-bottom: 3px; }
    .gc-banner p  { font-size: .74rem; color: var(--muted); }
    .gc-links { display: flex; gap: 7px; }
    a.gc-link { text-decoration: none; color: var(--muted); font-size: .74rem; padding: 5px 11px;
                background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
                display: flex; align-items: center; gap: 4px; transition: all .14s; }
    a.gc-link:hover { border-color: var(--green); color: var(--green); }

    /* ── TOOLTIP ── */
    .tooltip { position: fixed; pointer-events: none; z-index: 300; background: var(--surf);
               border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px;
               font-size: .72rem; opacity: 0; transition: opacity .1s; white-space: nowrap;
               box-shadow: 0 4px 14px var(--shadow); }
    .tt-lbl { color: var(--muted); }
    .tt-val { color: var(--text); font-weight: 600; }

    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">🖥 Programs Dashboard</div>
      <div class="brand-sub">hulkiokantabak</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"><!-- JS --></nav>
    <div class="sidebar-footer">
      <div class="token-row">
        <input type="password" id="tokenInput" placeholder="GitHub token (ghp_…)" oninput="saveToken()" />
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=Programs+Dashboard" target="_blank">
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:.67rem;">Get ↗</button>
        </a>
      </div>
      <span id="tokenStatus" class="tok-status tok-warn">⚠ Token needed for traffic &amp; commit data</span>
      <div class="footer-row">
        <button class="btn-icon btn" id="themeBtn" onclick="toggleTheme()" title="Day / Night">🌙</button>
        <button class="btn btn-green" onclick="loadAll()">⟳ Refresh</button>
        <span class="last-upd" id="lastUpd">—</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-inner" id="mainContent"><!-- JS --></div>
  </main>

</div>

<div class="tooltip" id="tooltip">
  <div class="tt-lbl" id="ttLbl"></div>
  <div class="tt-val" id="ttVal"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  PROGRAMS CONFIG
//  Add a new program by appending one { } block below.
//  name = exact GitHub repo slug (required)
//  url  = live URL, or null
// ═══════════════════════════════════════════════════════
const OWNER = 'hulkiokantabak';
const PROGRAMS = [
  { name:'bounce-game',        display:'BOUNCE',             icon:'🏀', tag:'Arcade',
    desc:'A one-thumb browser game. The ball drops. You tap. It bounces.',
    url:'https://hulkiokantabak.github.io/bounce-game/' },
  { name:'trace-game',         display:'Trace',              icon:'🕵️', tag:'Text Adventure',
    desc:'A solo narrative exploration game set in present-day East London.',
    url:'https://hulkiokantabak.github.io/trace-game/' },
  { name:'heart-quest',        display:'Heart Quest',        icon:'💘', tag:'Dating Sim',
    desc:'A browser dating simulator. 12 characters, 10 locations, 80+ actions.',
    url:'https://hulkiokantabak.github.io/heart-quest/' },
  { name:'Bosphorus-Ferry',    display:'Bosphorus Ferry',    icon:'⛴️', tag:'Interactive Fiction',
    desc:'A choice-driven text adventure set in Istanbul. 3 episodes, 8 endings.',
    url:'https://hulkiokantabak.github.io/Bosphorus-Ferry/' },
  { name:'nft-rarity-scorer',  display:'NFT Rarity Scorer',  icon:'🔍', tag:'Tool',
    desc:'Score NFT traits by rarity tiers using OpenSea data. Browser tool.',
    url:'https://hulkiokantabak.github.io/nft-rarity-scorer/' },
  { name:'programs-dashboard', display:'Programs Dashboard', icon:'🖥', tag:'Meta',
    desc:'This dashboard — monitors all programs via GitHub and GoatCounter.',
    url:'https://hulkiokantabak.github.io/programs-dashboard/' },
  // ── ADD NEW PROGRAMS HERE ──────────────────────────────
  // { name:'repo-slug', display:'Name', icon:'🎯', tag:'Category',
  //   desc:'Description.', url:'https://hulkiokantabak.github.io/repo-slug/' },
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let token       = '';
let currentView = 'all';     // 'all' | program.name
let starsMode   = 'lifetime'; // stars: 'lifetime' | '14d'
let forksMode   = 'lifetime'; // forks: 'lifetime' | '14d'
let cmtMode     = '14d';      // commits:       '14d'      | '52w'
const cache     = {};
const retrying  = new Set();

// ═══════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════
function toggleTheme() {
  const toDark = !document.documentElement.classList.contains('dark');
  document.documentElement.className = toDark ? 'dark' : 'light';
  document.getElementById('themeBtn').textContent = toDark ? '🌙' : '☀️';
  localStorage.setItem('pd_theme', toDark ? 'dark' : 'light');
  renderCurrentView();
}
function applyTheme() {
  const t = localStorage.getItem('pd_theme') || 'dark';
  document.documentElement.className = t;
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
}

// ═══════════════════════════════════════════════════════
//  TOKEN  — stored only in browser localStorage
// ═══════════════════════════════════════════════════════
function saveToken() {
  token = document.getElementById('tokenInput').value.trim();
  localStorage.setItem('pd_token', token);
  refreshTokenUI();
  loadAll();
}
function loadToken() {
  token = localStorage.getItem('pd_token') || '';
  if (token) document.getElementById('tokenInput').value = token;
  refreshTokenUI();
}
function refreshTokenUI() {
  const el = document.getElementById('tokenStatus');
  el.textContent = token ? '✓ Token active — all stats enabled'
                         : '⚠ Token needed for traffic & commit data';
  el.className = 'tok-status ' + (token ? 'tok-ok' : 'tok-warn');
}

// ═══════════════════════════════════════════════════════
//  GITHUB API
// ═══════════════════════════════════════════════════════
async function gh(path, accept) {
  const h = { Accept: accept || 'application/vnd.github+json' };
  if (token) h.Authorization = `Bearer ${token}`;
  const r = await fetch('https://api.github.com' + path, { headers: h });
  if (r.status === 202) return null;
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}
async function fetchCommitStats(name) {
  const path  = `/repos/${OWNER}/${name}/stats/commit_activity`;
  const data  = await gh(path);
  if (data !== null) return data;
  if (!retrying.has(name)) { retrying.add(name); bgRetry(name, path, [45000, 90000, 180000]); }
  return null;
}
async function bgRetry(name, path, delays) {
  for (const d of delays) {
    await sleep(d);
    try {
      const data = await gh(path);
      if (data && data.length) {
        if (cache[name]) cache[name].commitStats = data;
        retrying.delete(name);
        const el = document.getElementById(`${name}-spark-stat`);
        if (el) el.textContent = '';
        const sc  = document.getElementById(`${name}-spark`);
        const pts = data.map(w => ({ label: weekStr(w.week), val: w.total||0 }));
        if (sc) requestAnimationFrame(() => drawSparkline(sc, pts, '#bc8cff'));
        if (currentView === 'all' || currentView === name) renderCurrentView();
        return;
      }
    } catch (_) {}
  }
  retrying.delete(name);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════════════
//  CANVAS UTILITIES
// ═══════════════════════════════════════════════════════
function cssVar(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function isDark()  { return document.documentElement.classList.contains('dark'); }

// ── Bar chart ─────────────────────────────────────────
// points: [{ label, val, uniq? }]
// If uniq is provided, draws a narrower bright inner bar showing unique visitors
function drawBars(canvas, points, color, key) {
  if (!canvas || !points.length) return;
  const dpr  = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (!rect.width) return;
  const LBLH = 16;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pL = 6, pR = 6, pT = 10, pB = LBLH + 5;
  const cW = W - pL - pR, cH = H - pT - pB;
  const hasUniq = points.some(p => p.uniq > 0);
  const maxV    = Math.max(...points.map(p => p.val), 1);

  // Grid lines
  const ga = isDark() ? .07 : .09;
  ctx.strokeStyle = isDark() ? `rgba(255,255,255,${ga})` : `rgba(0,0,0,${ga})`;
  ctx.lineWidth   = 0.5;
  [.25, .5, .75, 1].forEach(t => {
    const gy = pT + cH * t;
    ctx.beginPath(); ctx.moveTo(pL, gy); ctx.lineTo(W - pR, gy); ctx.stroke();
  });

  // Max-value label
  ctx.fillStyle    = cssVar('--dim');
  ctx.font         = `9px -apple-system, 'Segoe UI', sans-serif`;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`${maxV}`, pL, 1);

  const gap = Math.max(1.5, cW * .012);
  const bW  = Math.max(3, cW / points.length - gap);
  canvas._bars = [];

  points.forEach((p, i) => {
    const bH = p.val > 0 ? Math.max(3, (p.val / maxV) * cH) : 0;
    const x  = pL + (i / points.length) * cW + (cW / points.length - bW) / 2;
    const y  = pT + cH - bH;

    if (bH > 0) {
      // Outer bar — total (faded gradient)
      const gOuter = ctx.createLinearGradient(x, y, x, y + bH);
      gOuter.addColorStop(0, color + 'bb');
      gOuter.addColorStop(1, color + '1e');
      ctx.fillStyle = gOuter;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(x, y, bW, bH, [3,3,0,0]);
      else ctx.rect(x, y, bW, bH);
      ctx.fill();

      // Inner bar — unique visitors (solid, narrower)
      if (hasUniq && p.uniq > 0) {
        const uH = Math.max(2, (p.uniq / maxV) * cH);
        const uy = pT + cH - uH;
        const iX = x + bW * .18;
        const iW = bW * .64;
        const gInner = ctx.createLinearGradient(iX, uy, iX, uy + uH);
        gInner.addColorStop(0, color);
        gInner.addColorStop(1, color + '88');
        ctx.fillStyle = gInner;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(iX, uy, iW, uH, [2,2,0,0]);
        else ctx.rect(iX, uy, iW, uH);
        ctx.fill();
      }
    }
    canvas._bars.push({ x, y: pT, w: bW, fullH: cH, p });
  });
  canvas._key = key;

  // X-axis labels
  const step = Math.max(1, Math.ceil(points.length / 6));
  ctx.fillStyle    = cssVar('--dim');
  ctx.font         = `9px -apple-system, 'Segoe UI', sans-serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'bottom';
  points.forEach((p, i) => {
    if (i % step === 0 || i === points.length - 1) {
      const cx = pL + (i / points.length) * cW + (cW / points.length) / 2;
      ctx.fillText(p.label, cx, H - 1);
    }
  });
}

// ── Sparkline ─────────────────────────────────────────
function drawSparkline(canvas, points, color) {
  if (!canvas || !points.length) return;
  const dpr  = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (!rect.width) return;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pL = 1, pR = 1, pT = 3, pB = 3;
  const cW = W - pL - pR, cH = H - pT - pB;
  const ga = isDark() ? .05 : .07;
  ctx.strokeStyle = isDark() ? `rgba(255,255,255,${ga})` : `rgba(0,0,0,${ga})`;
  ctx.lineWidth   = 0.5;
  [.5].forEach(t => {
    const gy = pT + cH * t;
    ctx.beginPath(); ctx.moveTo(pL, gy); ctx.lineTo(W - pR, gy); ctx.stroke();
  });
  const maxV = Math.max(...points.map(p => p.val), 1);
  const bW   = Math.max(1, cW / points.length - 1);
  canvas._bars = [];
  points.forEach((p, i) => {
    const bH = p.val > 0 ? Math.max(2, (p.val / maxV) * cH) : 1;
    const x  = pL + (i / points.length) * cW + (cW / points.length - bW) / 2;
    const y  = pT + cH - bH;
    const recent = i >= points.length - 2;
    if (recent) {
      const g = ctx.createLinearGradient(x, y, x, y + bH);
      g.addColorStop(0, color); g.addColorStop(1, color + '55');
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = color + '30';
    }
    ctx.fillRect(x, y, bW, bH);
    canvas._bars.push({ x, y: pT, w: bW, fullH: cH, p });
  });
  canvas._key = 'commits';
}

// ── Tooltip ───────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
document.addEventListener('mousemove', e => {
  const el = e.target.tagName === 'CANVAS' ? e.target : null;
  if (!el || !el._bars) { tooltip.style.opacity = 0; return; }
  const rect = el.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  for (const b of el._bars) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.fullH) {
      document.getElementById('ttLbl').textContent = b.p.label;
      const k    = el._key;
      const unit = k === 'clones' ? 'clones' : k === 'views' ? 'views' : 'commits';
      const uniq = b.p.uniq > 0 ? ` · ${b.p.uniq} unique` : '';
      document.getElementById('ttVal').textContent = `${b.p.val} ${unit}${uniq}`;
      tooltip.style.opacity = 1;
      tooltip.style.left = (e.clientX + 13) + 'px';
      tooltip.style.top  = (e.clientY - 40) + 'px';
      return;
    }
  }
  tooltip.style.opacity = 0;
});
document.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });

// ── Delegated toggle handler (replaces inline onclick on ctgl buttons) ──
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-fn]');
  if (!btn) return;
  const fn  = btn.getAttribute('data-fn');
  const val = btn.getAttribute('data-val');
  if      (fn === 'setStarsMode') setStarsMode(val);
  else if (fn === 'setForksMode') setForksMode(val);
  else if (fn === 'setCmtMode')   setCmtMode(val);
});

//  HELPERS
// ═══════════════════════════════════════════════════════
function fmtK(n)    { if (n == null) return '—'; return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate()-n); return d.toISOString(); }
function dateStr(s) { return s.slice(5,10); }
function weekStr(t) { return new Date(t*1000).toISOString().slice(2,7); }
function sign(n)    { return n > 0 ? `+${n}` : '—'; }

// ═══════════════════════════════════════════════════════

function renderProgram(prog) {
  if (!prog) return;
  const n      = prog.name;
  const d      = cache[n] || {};
  const cutoff = new Date(daysAgo(14));

  const vPts   = (d.views?.views   || []).map(x => ({ label: dateStr(x.timestamp), val: x.count, uniq: x.uniques }));
  const cPts   = (d.clones?.clones || []).map(x => ({ label: dateStr(x.timestamp), val: x.count, uniq: x.uniques }));

  const vTot     = d.views?.count    ?? 0;
  const vUniq    = d.views?.uniques  ?? 0;
  const cTot     = d.clones?.count   ?? 0;
  const cUniq    = d.clones?.uniques ?? 0;

  const info     = d.info || {};
  const stars    = info.stargazers_count ?? 0;
  const forks    = info.forks_count     ?? 0;
  const sgList   = d.stargazers || [];
  const fkList   = d.forks     || [];
  const starsNew = sgList.filter(s => new Date(s.starred_at||0) >= cutoff).length;
  const forksNew = fkList.filter(f => new Date(f.created_at||0) >= cutoff).length;

  const c14      = (d.commits14 || []).length;
  const weekly   = d.commitStats || [];
  const c52      = weekly.reduce((s,w) => s+(w.total||0), 0);
  const sparkPts = weekly.map(w => ({ label: weekStr(w.week), val: w.total||0 }));
  const computing = token && !sparkPts.length;

  document.getElementById('mainContent').innerHTML = `
    <div class="prog-header">
      <div>
        <div class="prog-title">${prog.icon} ${prog.display}
          <span class="prog-tag">${prog.tag}</span>
        </div>
        <div class="prog-desc">${prog.desc}</div>
      </div>
      <div class="prog-btns">
        ${prog.url ? `<a href="${prog.url}" target="_blank" class="pbtn play">▶ Open</a>` : ''}

    ${buildStatCards({ vTot, vUniq, cTot, cUniq, stars, starsNew, forks, forksNew, c14, c52, computing })}

    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">📡 Traffic</span>
        <span class="period" style="color:var(--dim)">· last 14 days</span>
        ${vPts.some(p=>p.uniq>0) ? `<span style="font-size:.65rem;color:var(--dim);margin-left:4px">— wide bar = total &nbsp;|&nbsp; inner bar = unique</span>` : ''}
      </div>
      <div class="traffic-cols">
        <div>
          <div style="font-size:.72rem;color:var(--blue);margin-bottom:7px">👁 Views</div>
          <div class="chart-wrap" style="height:130px"><canvas id="${n}-vc"></canvas></div>
        </div>
        <div>
          <div style="font-size:.72rem;color:var(--green);margin-bottom:7px">📥 Clones</div>
          <div class="chart-wrap" style="height:130px"><canvas id="${n}-cc"></canvas></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">🔨 Commits</span>
        <span class="period" style="color:var(--dim)">· 52-week weekly breakdown (last 2 weeks highlighted)</span>
      </div>
      <div class="spark-box">
        <div class="spark-hdr">
          <div class="spark-lbl">Weekly commit activity</div>
          <div class="spark-stat" id="${n}-spark-stat">${computing ? '⏳ computing…' : ''}</div>
        </div>
        <div class="spark-wrap" style="height:60px"><canvas id="${n}-spark"></canvas></div>
      </div>
    </div>

    <div class="gc-banner">
      <div>
        <h3>📊 Analytics — GoatCounter</h3>
        <p>Real visitor counts, countries, devices and referrers. Tracks from setup onwards — your true lifetime metric.</p>
      </div>
      <div class="gc-links">
        <a href="https://hulkiokantabak.goatcounter.com" target="_blank" class="gc-link">📈 Dashboard</a>
        <a href="https://hulkiokantabak.goatcounter.com/settings/main" target="_blank" class="gc-link">⚙️ Settings</a>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    if (vPts.length)    drawBars(document.getElementById(`${n}-vc`), vPts, '#1f6feb', 'views');
    if (cPts.length)    drawBars(document.getElementById(`${n}-cc`), cPts, '#238636', 'clones');
    if (sparkPts.length) drawSparkline(document.getElementById(`${n}-spark`), sparkPts, '#bc8cff');
  });
}

// ═══════════════════════════════════════════════════════
//  RENDER — ALL PROGRAMS
// ═══════════════════════════════════════════════════════
function renderAllPrograms() {
  const cutoff = new Date(daysAgo(14));

  let totV=0, totVU=0, totC=0, totCU=0, totS=0, totSNew=0, totF=0, totFNew=0, totCm14=0, totCm52=0;
  let anyComputing = false;

  const rows = PROGRAMS.map(prog => {
    const d   = cache[prog.name] || {};
    const v   = d.views?.count             ?? 0;
    const vu  = d.views?.uniques           ?? 0;
    const c   = d.clones?.count            ?? 0;
    const cu  = d.clones?.uniques          ?? 0;
    const s   = d.info?.stargazers_count   ?? 0;
    const f   = d.info?.forks_count        ?? 0;
    const sn  = (d.stargazers||[]).filter(x => new Date(x.starred_at||0) >= cutoff).length;
    const fn  = (d.forks||[]).filter(x => new Date(x.created_at||0) >= cutoff).length;
    const cm  = (d.commits14||[]).length;
    const cm52= (d.commitStats||[]).reduce((a,w)=>a+(w.total||0),0);
    if (token && !d.commitStats) anyComputing = true;
    totV   += v; totVU  += vu; totC   += c; totCU  += cu;
    totS   += s; totSNew+= sn; totF   += f; totFNew+= fn;
    totCm14+= cm; totCm52+= cm52;
    return { prog, v, vu, c, cu, s, sn, f, fn, cm };
  });

  // Combined daily traffic (total + unique per day, summed across programs)
  const dayMap = {};
  PROGRAMS.forEach(prog => {
    (cache[prog.name]?.views?.views || []).forEach(x => {
      const k = dateStr(x.timestamp);
      if (!dayMap[k]) dayMap[k] = { val:0, uniq:0 };
      dayMap[k].val  += x.count;
      dayMap[k].uniq += x.uniques;
    });
  });
  const allVPts = Object.entries(dayMap).sort(([a],[b])=>a<b?-1:1)
                    .map(([label,d]) => ({ label, val:d.val, uniq:d.uniq }));

  // Combined clones
  const cloneMap = {};
  PROGRAMS.forEach(prog => {
    (cache[prog.name]?.clones?.clones || []).forEach(x => {
      const k = dateStr(x.timestamp);
      if (!cloneMap[k]) cloneMap[k] = { val:0, uniq:0 };
      cloneMap[k].val  += x.count;
      cloneMap[k].uniq += x.uniques;
    });
  });
  const allCPts = Object.entries(cloneMap).sort(([a],[b])=>a<b?-1:1)
                    .map(([label,d]) => ({ label, val:d.val, uniq:d.uniq }));

  // Combined weekly commits
  const wkMap = {};
  PROGRAMS.forEach(prog => {
    (cache[prog.name]?.commitStats || []).forEach(w => {
      const k = weekStr(w.week);
      wkMap[k] = (wkMap[k]||0) + (w.total||0);
    });
  });
  const allSPts = Object.entries(wkMap).sort(([a],[b])=>a<b?-1:1).map(([label,val])=>({label,val}));

  document.getElementById('mainContent').innerHTML = `

    ${buildStatCards({ vTot:totV, vUniq:totVU, cTot:totC, cUniq:totCU,
                       stars:totS, starsNew:totSNew, forks:totF, forksNew:totFNew,
                       c14:totCm14, c52:totCm52, computing:anyComputing })}

    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">📋 Programs Breakdown</span>
        <span class="period" style="color:var(--dim)">· click any row to drill in</span>
      </div>
      <table class="prog-table">
        <thead>
          <tr>
            <th>Program</th>

            <th class="r">Clones 14d</th>
            <th class="r">Unique</th>

            <th class="r">Forks ⑂ <span style="font-weight:400;color:var(--dim)">${forksMode==='14d'?'14d':'all'}</span></th>
            <th class="r">Commits <span style="font-weight:400;color:var(--dim)">14d</span></th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(({prog,v,vu,c,cu,s,sn,f,fn,cm}) => `
            <tr onclick="navigate('${prog.name}')">
              <td><div class="prog-name-cell">${prog.icon} ${prog.display}
                <span class="tag-sm">${prog.tag}</span></div></td>
              <td class="nc blue">${fmtK(v)}</td>
              <td class="nc muted">${fmtK(vu)}</td>

              <td class="nc purple">${fmtK(forksMode==='14d' ? fn : f)}</td>
              <td class="nc" style="color:var(--muted)">${fmtK(cm)}</td>
            </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td>Totals</td>
            <td class="nc blue">${fmtK(totV)}</td>
            <td class="nc muted">${fmtK(totVU)}</td>

    ${allVPts.length ? `

    </div>`;

  requestAnimationFrame(() => {
    if (allVPts.length)  drawBars(document.getElementById('all-vc'),    allVPts, '#1f6feb', 'views');
    if (allCPts.length)  drawBars(document.getElementById('all-cc'),    allCPts, '#238636', 'clones');
    if (allSPts.length)  drawSparkline(document.getElementById('all-spark'), allSPts, '#bc8cff');
  });
}

// ═══════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════
async function fetchProgram(prog) {
  const n = prog.name, since14 = daysAgo(14);
  const [info, views, clones, stars, forks, commits14, commitStats] =
    await Promise.allSettled([
      gh(`/repos/${OWNER}/${n}`),
      token ? gh(`/repos/${OWNER}/${n}/traffic/views`)  : Promise.resolve(null),
      token ? gh(`/repos/${OWNER}/${n}/traffic/clones`) : Promise.resolve(null),
      token ? gh(`/repos/${OWNER}/${n}/stargazers?per_page=100&sort=newest`,
                  'application/vnd.github.star+json')   : Promise.resolve([]),
      token ? gh(`/repos/${OWNER}/${n}/forks?sort=newest&per_page=100`) : Promise.resolve([]),
      token ? gh(`/repos/${OWNER}/${n}/commits?since=${since14}&author=${OWNER}&per_page=100`)
            : Promise.resolve([]),
      token ? fetchCommitStats(n) : Promise.resolve(null),
    ]);
  cache[n] = {
    info:        info.status        === 'fulfilled' ? info.value        : {},
    views:       views.status       === 'fulfilled' ? views.value       : null,
    clones:      clones.status      === 'fulfilled' ? clones.value      : null,
    stargazers:  stars.status       === 'fulfilled' ? (stars.value||[]) : [],
    forks:       forks.status       === 'fulfilled' ? (forks.value||[]) : [],
    commits14:   commits14.status   === 'fulfilled' ? (commits14.value||[]) : [],
    commitStats: commitStats.status === 'fulfilled' ? commitStats.value : null,
  };
}

async function loadAll() {
  document.getElementById('lastUpd').textContent = 'Loading…';
  await Promise.allSettled(PROGRAMS.map(fetchProgram));
  updateBadges();
  renderCurrentView();
  document.getElementById('lastUpd').textContent = new Date().toLocaleTimeString();
}

// ═══════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════
let rsT;
window.addEventListener('resize', () => { clearTimeout(rsT); rsT = setTimeout(renderCurrentView, 200); });

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
applyTheme();
loadToken();
buildSidebar();
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
